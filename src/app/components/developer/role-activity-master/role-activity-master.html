<div class="bg-[#FFFFFF] min-h-screen p-4 sm:p-6 lg:p-0">
    <div class="bg-white overflow-visible">
        <div class="flex items-center justify-between p-3 sm:p-3 border-b border-gray-200">
            <p-breadcrumb [model]="breadcrumbItems" />
            <div class="flex items-center space-x-2">
                <p-button (click)="showDialog('add',[])" [label]="FormName" pTooltip="Add {{FormName}}"
                    icon="pi pi-plus" variant="text" [raised]="true" styleClass="orange-button" />
            </div>
        </div>

        <app-table-template [data]="data" [columns]="columns" [pageSize]="pageSize" [totalCount]="totalCount"
            (refresh)="getTableData(true)" [isLoading]="isLoading" [currentPage]="pageNo" [sortColumn]="sortColumn"
            [sortDirection]="sortDirection" [searchText]="searchText" [actionTemplate]="actionTemplateRef"
            (pageChange)="onPageChange($event)" (searchChange)="onSearchChange($event)"
            (sortChange)="onSortChange($event)" (pageSizeChange)="onPageSizeChange($event)">
        </app-table-template>

        <ng-template #actionTemplateRef let-item>
            <button type="button" class="text-gray-400 hover:text-gray-600 cursor-pointer" (click)="op.toggle($event)">
                <i class="pi pi-ellipsis-v cursor-pointer"></i>
            </button>

            <p-popover #op>
                <div class="flex flex-col">
                    <button (click)="showDialog('view', item); op.hide()" pTooltip="View {{FormName}}"
                        class="px-4 py-2 hover:bg-gray-100 text-left">
                        <i class="pi pi-eye"></i>
                    </button>
                    <button (click)="showDialog('update', item); op.hide()" pTooltip="Update {{FormName}}"
                        class="px-4 py-2 hover:bg-gray-100 text-left">
                        <i class="pi pi-pencil"></i>
                    </button>
                    <button (click)="deleteItem(item);op.hide()" class="px-4 py-2 hover:bg-gray-100 text-left"
                        pTooltip="Delete {{FormName}}">
                        <i class="pi pi-trash"></i>
                    </button>
                </div>
            </p-popover>
        </ng-template>
    </div>

    <p-drawer [(visible)]="visible" position="right" [modal]="true" (onHide)="onDrawerHide()"
        class="sm:w-[60%] w-full !max-w-full" [style]="{ width: '60%', 'max-width': '100%' }">
        <ng-template pTemplate="header">
            <div class="flex items-center gap-2">
                <span class="font-semibold text-2xl">{{header}}</span>
                <i class="text-blue-500" [ngClass]="headerIcon"></i>
            </div>
        </ng-template>
        <ng-template pTemplate="content" [style]="{padding: '2rem'}">
            @if(isFormLoading){
            <div class="flex items-center justify-center min-h-[400px]">
                <p-progress-spinner strokeWidth="8" fill="transparent" animationDuration=".5s"
                    [style]="{ width: '50px', height: '50px' }" />
            </div>
            }@else{

            <form [formGroup]="roleActivityMaster" (ngSubmit)="onSubmit($event)"
                class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Role*</label>
                    <p-select [options]="roleDrp" formControlName="role" optionLabel="drpOption" [filter]="true"
                        filterBy="drpOption" [showClear]="true" appendTo="body" placeholder="Select role"
                        [class.border-red-500]="isInvalid('role')" class="custom-p-select w-full">
                    </p-select>
                    @if(isInvalid('role')){
                    <p class="text-red-500 text-xs mt-1">Role is required.</p>
                    }
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Menu*</label>
                    <p-select [options]="menuDrp" formControlName="menu" optionLabel="drpOption" [filter]="true"
                        filterBy="drpOption" [showClear]="true" appendTo="body" placeholder="Select menu"
                        [class.border-red-500]="isInvalid('menu')" class="custom-p-select w-full">
                    </p-select>
                    @if(isInvalid('menu')){
                    <p class="text-red-500 text-xs mt-1">Menu is required.</p>
                    }
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Sub Menu</label>
                    <p-select [options]="subMenuDrp" formControlName="subMenu" optionLabel="drpOption" [filter]="true"
                        filterBy="drpOption" [showClear]="true" appendTo="body" placeholder="Select sub menu"
                        class="custom-p-select w-full">
                    </p-select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Activity*</label>
                    <p-select [options]="activityDrp" formControlName="activity" optionLabel="drpOption" [filter]="true"
                        filterBy="drpOption" [showClear]="true" appendTo="body" placeholder="Select activity"
                        [virtualScroll]="true" [virtualScrollItemSize]="38"
                        [class.border-red-500]="isInvalid('activity')" class="custom-p-select w-full">
                    </p-select>
                    @if(isInvalid('activity')){
                    <p class="text-red-500 text-xs mt-1">Activity is required.</p>
                    }
                </div>

            </form>
            }
        </ng-template>
        <ng-template pTemplate="footer">
            @if(postType !== 'view'){
            <div class="flex justify-end space-x-3 pt-4 border-t-2 border-gray-300 mt-4">
                <button pButton type="submit" (click)="onSubmit($event)"
                    class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg shadow transition">{{
                    postType === 'add' ? 'Submit' : 'Update' }}</button>
                @if(postType === 'add'){
                <button pButton label="Reset" (click)="onClear()"
                    class="px-6 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded-lg shadow transition"></button>
                }
            </div>
            }
        </ng-template>
    </p-drawer>
</div>

<p-confirmdialog></p-confirmdialog>
<p-toast></p-toast>
