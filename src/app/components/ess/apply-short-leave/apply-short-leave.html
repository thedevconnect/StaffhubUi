<div class="flex items-center justify-between bg-white border-b border-slate-200 -mx-4 -mt-4 md:-mx-6 md:-mt-6 mb-4 pr-4 md:pr-6">
  <div class="flex-1 min-w-0">
    <p-breadcrumb [model]="breadcrumbItems" styleClass="!border-0 !rounded-none !bg-transparent !px-4 md:!px-6 !py-2.5 text-xs md:text-sm"></p-breadcrumb>
  </div>
  <div class="flex-none">
    <p-button label="Request Short Leave" icon="pi pi-plus"
      styleClass="p-button-sm rounded-lg btn-add text-xs font-semibold px-3 py-1.5 shadow-sm transition-all" [raised]="true">
    </p-button>
  </div>
</div>

<section class="space-y-4">
  <header class="rounded-xl border border-slate-200 bg-white p-4 md:p-5">
    <div class="flex items-center justify-between flex-wrap gap-4">
      <div>
        <h2 class="text-xl font-semibold text-slate-900">Apply Short Leave</h2>
        <p class="mt-1 text-sm text-slate-500">Submit requests for short leaves, such as arriving late or leaving early for specific personal reasons.</p>
      </div>
    </div>
  </header>

  <p-card header="My Short Leave Requests">
    <p-table [value]="shortLeaves" styleClass="p-datatable-sm">
      <ng-template pTemplate="header">
        <tr>
          <th>Date</th>
          <th>Request Type</th>
          <th>Duration</th>
          <th>Reason</th>
          <th>Status</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-req>
        <tr>
          <td class="font-medium text-slate-800">{{ req.date | date:'mediumDate' }}</td>
          <td>{{ req.type }}</td>
          <td>{{ req.duration }}</td>
          <td>{{ req.reason }}</td>
          <td>
            <span class="inline-flex items-center gap-1 rounded-full bg-emerald-50 px-2 py-1 text-xs font-semibold text-emerald-700">
              <span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span>
              {{ req.status }}
            </span>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</section>
