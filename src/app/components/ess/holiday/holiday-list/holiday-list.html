<div class="min-h-screen bg-slate-50/50">
    <p-toast></p-toast>

    <div class="-mx-4 -mt-4 md:-mx-6 md:-mt-6 mb-6 bg-white border-b border-slate-200 shadow-sm">
        <div class="px-4 md:px-6 py-3.5">
            <div class="w-full overflow-x-auto">
                <p-breadcrumb [model]="breadcrumbItems"
                    styleClass="!border-0 !rounded-none !bg-transparent !p-0 text-xs md:text-sm !w-max">
                </p-breadcrumb>
            </div>
        </div>
    </div>

    <section class="space-y-4">
        <div class="rounded-xl border border-slate-200 bg-white overflow-hidden shadow-sm">
            <div class="w-full overflow-x-auto">
                <app-table-template [data]="holiday_calendar" [columns]="columns" [pageSize]="pageSize"
                    [totalCount]="totalCount" [isLoading]="loading()" [currentPage]="pageNo" [searchText]="searchText"
                    [showRefresh]="true" (refresh)="loadDashboardData()" (pageChange)="onPageChange($event)"
                    (searchChange)="onSearchChange($event)" (sortChange)="onSortChange($event)"
                    (pageSizeChange)="onPageSizeChange($event)">
                </app-table-template>
            </div>
        </div>
    </section>
</div>
