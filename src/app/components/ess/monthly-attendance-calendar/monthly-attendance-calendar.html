<div class="-mx-4 -mt-4 md:-mx-6 md:-mt-6 mb-4">
  <p-breadcrumb [model]="breadcrumbItems"
    styleClass="!border-0 !border-b !border-slate-200 !rounded-none !bg-white !px-4 md:!px-6 !py-2.5 text-xs md:text-sm"></p-breadcrumb>
</div>
<section class="space-y-4">
  <header class="rounded-xl border border-slate-200 bg-white p-4 md:p-5">
    <h2 class="text-xl font-semibold text-slate-900">Monthly Attendance Calendar</h2>
    <p class="mt-1 text-sm text-slate-500">Overview of your month-wise attendance tracking sheet.</p>
  </header>

  <p-card header="June 2026">
    <!-- Grid Calendar -->
    <div class="grid grid-cols-7 gap-2 text-center font-semibold text-sm text-slate-600 border-b border-slate-100 pb-2 mb-2">
      <div *ngFor="let day of daysOfWeek" class="py-1">{{ day }}</div>
    </div>
    
    <div class="grid grid-cols-7 gap-2">
      <div *ngFor="let item of calendarDays" class="border border-slate-100 rounded-lg p-3 min-h-[80px] flex flex-col justify-between hover:bg-slate-50 transition">
        <span class="text-slate-500 text-sm font-semibold">{{ item.dayNum }}</span>
        <div class="flex justify-end">
          <span class="text-[10px] font-bold px-1.5 py-0.5 rounded uppercase" [ngClass]="item.colorClass">
            {{ item.type }}
          </span>
        </div>
      </div>
    </div>

    <!-- Legend -->
    <div class="flex flex-wrap gap-4 mt-6 border-t border-slate-100 pt-4 text-xs font-semibold">
      <div class="flex items-center gap-1.5">
        <span class="h-3.5 w-3.5 rounded bg-emerald-500 flex items-center justify-center text-[8px] text-white">P</span>
        <span class="text-slate-600">Present</span>
      </div>
      <div class="flex items-center gap-1.5">
        <span class="h-3.5 w-3.5 rounded bg-slate-400 flex items-center justify-center text-[8px] text-white font-bold">WO</span>
        <span class="text-slate-600">Weekly Off</span>
      </div>
    </div>
  </p-card>
</section>
