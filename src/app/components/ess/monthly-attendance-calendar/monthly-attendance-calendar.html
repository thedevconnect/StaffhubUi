<app-breadcrumb [items]="breadcrumbItems"></app-breadcrumb>
<section class="space-y-4">
  <header class="rounded-xl border border-slate-200 bg-white p-4 md:p-5">
    <h2 class="text-xl font-semibold text-slate-900">Monthly Attendance Calendar</h2>
    <p class="mt-1 text-sm text-slate-500">Overview of your month-wise attendance tracking sheet.</p>
  </header>

  <p-card>
    <ng-template pTemplate="header">
      <div class="flex items-center justify-between p-4 border-b border-slate-100">
        <div class="flex gap-2">
          <button (click)="prevMonth()"
            class="px-3 py-1.5 text-xs font-semibold bg-slate-100 hover:bg-slate-200 text-slate-700 rounded transition cursor-pointer">Previous</button>
          <button (click)="today()"
            class="px-3 py-1.5 text-xs font-semibold bg-slate-100 hover:bg-slate-200 text-slate-700 rounded transition cursor-pointer">Today</button>
          <button (click)="nextMonth()"
            class="px-3 py-1.5 text-xs font-semibold bg-slate-100 hover:bg-slate-200 text-slate-700 rounded transition cursor-pointer">Next</button>
        </div>
        <h3 class="text-lg font-bold text-slate-800">{{ monthYearString() }}</h3>
      </div>
    </ng-template>

    <!-- Grid Calendar -->
    <div
      class="grid grid-cols-7 gap-2 text-center font-semibold text-sm text-slate-600 border-b border-slate-100 pb-2 mb-2">
      <div *ngFor="let day of daysOfWeek" class="py-1">{{ day }}</div>
    </div>

    <div class="grid grid-cols-7 gap-2">
      <div *ngFor="let item of calendarDays()"
        (click)="selectDay($event, item, op)"
        class="border rounded-lg p-3 min-h-[80px] flex flex-col justify-between transition cursor-pointer"
        [ngClass]="item.dayNum ? 'border-slate-100 hover:bg-slate-50 bg-white' : 'bg-transparent border-transparent'">
        <ng-container *ngIf="item.dayNum">
          <span class="text-slate-500 text-sm font-semibold">{{ item.dayNum }}</span>
          <div class="flex flex-col items-end justify-end mt-auto gap-1">
            <span *ngIf="item.swipeIn" class="text-[9px] font-bold text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded border border-slate-200">
              IN: {{ item.swipeIn }}
            </span>
            <span *ngIf="item.type" class="text-[10px] font-bold px-1.5 py-0.5 rounded uppercase" [ngClass]="item.colorClass">
              {{ item.type }}
            </span>
          </div>
        </ng-container>
      </div>
    </div>

    <!-- Legend -->
    <div class="flex flex-wrap gap-4 mt-6 border-t border-slate-100 pt-4 text-xs font-semibold">
      <div class="flex items-center gap-1.5">
        <span class="h-3.5 w-3.5 rounded bg-emerald-500 flex items-center justify-center text-[8px] text-white">P</span>
        <span class="text-slate-600">Present</span>
      </div>
      <div class="flex items-center gap-1.5">
        <span class="h-3.5 w-3.5 rounded bg-rose-500 flex items-center justify-center text-[8px] text-white">A</span>
        <span class="text-slate-600">Absent</span>
      </div>
      <div class="flex items-center gap-1.5">
        <span
          class="h-3.5 w-3.5 rounded bg-amber-500 flex items-center justify-center text-[8px] text-white font-bold">HD</span>
        <span class="text-slate-600">Half Day</span>
      </div>
      <div class="flex items-center gap-1.5">
        <span
          class="h-3.5 w-3.5 rounded bg-slate-400 flex items-center justify-center text-[8px] text-white font-bold">WO</span>
        <span class="text-slate-600">Weekly Off</span>
      </div>
    </div>
  </p-card>
</section>

<!-- Click Overlay Popup -->
<p-popover #op styleClass="rounded-lg shadow-lg border border-slate-100 p-2">
  <ng-template pTemplate="content">
    <div class="text-xs font-semibold text-slate-700 min-w-[120px]" *ngIf="selectedDay()">
      <div class="flex justify-between py-1.5 border-b border-slate-100">
        <span class="text-slate-400">IN</span>
        <span>{{ selectedDay().swipeIn || '-' }}</span>
      </div>
      <div class="flex justify-between py-1.5">
        <span class="text-slate-400">OUT</span>
        <span>{{ selectedDay().swipeOut || '-' }}</span>
      </div>
    </div>
  </ng-template>
</p-popover>
