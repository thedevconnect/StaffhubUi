<app-breadcrumb [items]="breadcrumbItems"></app-breadcrumb>
<section class="flex flex-col items-center justify-center min-h-[400px] text-center p-8 bg-white border border-slate-200 rounded-xl space-y-6 relative overflow-hidden">
  <!-- Decorative Background Glow -->
  <div class="absolute -right-16 -top-16 w-48 h-48 rounded-full bg-blue-400/5 blur-2xl"></div>
  <div class="absolute -left-16 -bottom-16 w-48 h-48 rounded-full bg-indigo-400/5 blur-2xl"></div>

  <!-- Animated Orb -->
  <div class="relative flex items-center justify-center">
    <div class="absolute inset-0 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-500 opacity-20 blur-xl animate-pulse"></div>
    <div class="relative h-20 w-20 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-3xl shadow-sm border border-blue-100/50 transition duration-300 hover:scale-105">
      <i class="pi pi-chart-line"></i>
    </div>
  </div>

  <div class="space-y-2 max-w-md">
    <h2 class="text-2xl font-extrabold text-slate-800 tracking-tight">Performance Management</h2>
    <p class="text-slate-500 text-sm leading-relaxed">Define professional goals, fill out review feedback, and complete self appraisals.</p>
  </div>

  <span class="inline-flex items-center gap-2 rounded-full bg-blue-50/80 px-4 py-1.5 text-xs font-semibold text-blue-700 border border-blue-100 shadow-sm">
    <span class="h-2 w-2 rounded-full bg-blue-500 animate-ping"></span>
    Under Development
  </span>
</section>
