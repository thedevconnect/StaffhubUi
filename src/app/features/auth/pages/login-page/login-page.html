<section class="grid min-h-screen place-items-center bg-gradient-to-br from-indigo-50 to-slate-50 p-4">
  <p-card class="w-full max-w-md">
    <ng-template pTemplate="title">StaffHub Login</ng-template>
    <ng-template pTemplate="subtitle">Use API credentials to continue</ng-template>

    <form [formGroup]="form" (ngSubmit)="submit()" class="mt-2 space-y-4">
      <div class="space-y-1">
        <label class="text-sm font-medium text-slate-700">Username</label>
        <input pInputText formControlName="username" class="w-full" placeholder="Enter username" />
      </div>

      <div class="space-y-1">
        <label class="text-sm font-medium text-slate-700">Password</label>
        <p-password
          formControlName="password"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
          placeholder="Enter password"
        />
      </div>

      <p-button
        type="submit"
        [label]="loading() ? 'Signing in...' : 'Sign In'"
        [loading]="loading()"
        styleClass="w-full"
      />
    </form>
  </p-card>

  <p-toast />
</section>
