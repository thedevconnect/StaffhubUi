<section class="space-y-4">
  <header class="rounded-xl border border-slate-200 bg-white p-4 md:p-5">
    <div class="flex items-center justify-between flex-wrap gap-4">
      <div>
        <h2 class="text-xl font-semibold text-slate-900">Attendance Regularization</h2>
        <p class="mt-1 text-sm text-slate-500">Apply for and view the status of attendance regularization requests.</p>
      </div>
      <button class="inline-flex items-center gap-1.5 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 transition cursor-pointer">
        <i class="pi pi-plus text-xs"></i>
        New Request
      </button>
    </div>
  </header>

  <p-card header="My Regularization Requests">
    <p-table [value]="requests" styleClass="p-datatable-sm">
      <ng-template pTemplate="header">
        <tr>
          <th>Log Date</th>
          <th>Requested In</th>
          <th>Requested Out</th>
          <th>Reason</th>
          <th>Approver</th>
          <th>Status</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-req>
        <tr>
          <td class="font-medium text-slate-800">{{ req.date | date:'mediumDate' }}</td>
          <td>{{ req.requestedIn }}</td>
          <td>{{ req.requestedOut }}</td>
          <td>{{ req.reason }}</td>
          <td>{{ req.approver }}</td>
          <td>
            <span class="inline-flex items-center gap-1 rounded-full px-2 py-1 text-xs font-semibold"
                  [ngClass]="req.status === 'Approved' ? 'bg-emerald-50 text-emerald-700' : 'bg-amber-50 text-amber-700'">
              <span class="h-1.5 w-1.5 rounded-full"
                    [ngClass]="req.status === 'Approved' ? 'bg-emerald-500' : 'bg-amber-500'"></span>
              {{ req.status }}
            </span>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</section>
