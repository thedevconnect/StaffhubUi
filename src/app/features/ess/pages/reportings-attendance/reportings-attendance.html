<div class="-mx-4 -mt-4 md:-mx-6 md:-mt-6 mb-4">
  <p-breadcrumb [model]="breadcrumbItems"
    styleClass="!border-0 !border-b !border-slate-200 !rounded-none !bg-white !px-4 md:!px-6 !py-2.5 text-xs md:text-sm"></p-breadcrumb>
</div>
<section class="space-y-4">
  <header class="rounded-xl border border-slate-200 bg-white p-4 md:p-5">
    <h2 class="text-xl font-semibold text-slate-900">Reportings Attendance</h2>
    <p class="mt-1 text-sm text-slate-500">Monitor and track the daily attendance logs of team members reporting to you.</p>
  </header>

  <p-card header="Team Attendance Logs">
    <p-table [value]="reportees" styleClass="p-datatable-sm">
      <ng-template pTemplate="header">
        <tr>
          <th>Employee ID</th>
          <th>Name</th>
          <th>Designation</th>
          <th>Check In</th>
          <th>Check Out</th>
          <th>Status</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-emp>
        <tr>
          <td><code class="text-xs bg-slate-100 px-1 py-0.5 rounded">{{ emp.empId }}</code></td>
          <td class="font-medium text-slate-800">{{ emp.name }}</td>
          <td>{{ emp.role }}</td>
          <td>{{ emp.checkIn }}</td>
          <td>{{ emp.checkOut }}</td>
          <td>
            <span class="inline-flex items-center gap-1 rounded-full px-2 py-1 text-xs font-semibold"
                  [ngClass]="emp.status === 'Present' ? 'bg-emerald-50 text-emerald-700' : 'bg-amber-50 text-amber-700'">
              <span class="h-1.5 w-1.5 rounded-full"
                    [ngClass]="emp.status === 'Present' ? 'bg-emerald-500' : 'bg-amber-500'"></span>
              {{ emp.status }}
            </span>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</section>
