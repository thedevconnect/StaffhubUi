<section class="space-y-4">
  <header class="rounded-xl border border-slate-200 bg-white p-4 md:p-5">
    <h2 class="text-xl font-semibold text-slate-900">{{ title() }}</h2>
    <p class="mt-1 text-sm text-slate-500">Users coming from <code>/users</code> API.</p>
  </header>

  <p-card header="Users">
    <app-data-table [value]="users()" [loading]="loading()" [columns]="columns" [rows]="10"
      [rowsPerPageOptions]="[5, 10, 25, 50]" [globalFilterFields]="[
        'emp_id',
        'full_name',
        'username',
        'email',
        'mobile',
        'role',
        'status',
      ]" />
  </p-card>
</section>
