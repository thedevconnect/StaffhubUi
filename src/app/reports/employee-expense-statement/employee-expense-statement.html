<!-- Page Header Inline with Breadcrumb -->
<div class="flex items-center justify-between bg-white border-b border-slate-200 -mx-4 -mt-4 md:-mx-6 md:-mt-6 mb-6 pr-4 md:pr-6">
  <div class="flex-1 min-w-0">
    <p-breadcrumb [model]="breadcrumbItems" styleClass="!border-0 !rounded-none !bg-transparent !px-4 md:!px-6 !py-2.5 text-xs md:text-sm"></p-breadcrumb>
  </div>
</div>

<div class="flex flex-col items-center justify-center min-h-[50vh] p-6 text-center">
  <div class="h-20 w-20 bg-amber-50 text-amber-500 rounded-3xl flex items-center justify-center text-4xl mb-6 border border-amber-100/50 shadow-sm animate-bounce">
    <i class="pi pi-cog spin-slow"></i>
  </div>
  <h3 class="text-xl font-bold text-slate-800 tracking-tight">Employee Expense Statement</h3>
  <p class="text-xs text-amber-700 bg-amber-50/50 border border-amber-100 px-3 py-1 rounded-full font-bold uppercase tracking-wider mt-2 mb-4">
    Under Development
  </p>
  <p class="text-sm text-slate-400 max-w-md leading-relaxed mb-6">
    We are currently configuring the expense reimbursement, travel statement, and conveyances ledger tables for this module.
  </p>
  <p-button routerLink="/payroll" label="Return to Dashboard" icon="pi pi-arrow-left" styleClass="p-button-secondary rounded-xl px-5 py-2.5 text-xs font-bold shadow-sm"></p-button>
</div>
