<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="-mx-4 -mt-4 md:-mx-6 md:-mt-6 mb-4 bg-white border-b border-slate-200 flex flex-col sm:flex-row items-start sm:items-center justify-between px-4 md:px-6 py-2.5 gap-3">
  <p-breadcrumb [model]="breadcrumbItems"
    styleClass="!border-0 !p-0 !bg-transparent text-xs md:text-sm"></p-breadcrumb>
  <button (click)="showDialog('add')" class="inline-flex items-center gap-1.5 rounded-lg bg-blue-600 px-4 py-2 text-xs font-semibold text-white shadow-sm hover:bg-blue-500 transition cursor-pointer w-full sm:w-auto justify-center">
    <i class="pi pi-plus text-xs"></i>
    New Request
  </button>
</div>

<section class="space-y-4">
  <header class="rounded-xl border border-slate-200 bg-white p-4 md:p-5">
    <div>
      <h2 class="text-xl font-semibold text-slate-900">Attendance Regularization</h2>
      <p class="mt-1 text-sm text-slate-500">Apply for and view the status of attendance regularization requests.</p>
    </div>
  </header>

  <p-card header="My Regularization Requests">
    <app-table-template
      [data]="requests"
      [columns]="tableColumns"
      [rowActions]="tableActions"
      [disableActionCondition]="disableAction"
      (actionClicked)="onActionClicked($event)"
      [showRefresh]="true"
      (refresh)="onRefresh()">
    </app-table-template>
  </p-card>
</section>

<p-drawer [(visible)]="visible" position="right" [modal]="true" [style]="{ width: '100%' }"
  (onHide)="onDrawerHide()" styleClass="modern-drawer !w-full md:!w-1/2">
  
  <ng-template pTemplate="header">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-blue-50 flex items-center justify-center text-blue-600 shadow-sm">
        <i [class]="headerIcon" class="text-xl"></i>
      </div>
      <h3 class="text-xl font-black text-gray-800 m-0 uppercase tracking-tight">{{header}}</h3>
    </div>
  </ng-template>

  <ng-template pTemplate="content">
    <div class="flex flex-col h-full bg-slate-50/50">
      <form [formGroup]="regForm" class="flex flex-col gap-6 p-4 sm:p-6 pb-24">
        
        <div class="bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col gap-6">
          <div class="flex flex-col gap-2">
            <label class="text-[10px] uppercase font-black text-gray-400 tracking-widest px-1">Log Date <span *ngIf="postType !== 'view'" class="text-red-500">*</span></label>
            <p-datepicker formControlName="date" dateFormat="dd/mm/yy" appendTo="body" styleClass="w-full"
              placeholder="Select date"
              [inputStyleClass]="isInvalid('date') ? 'border-red-500 rounded-xl py-3 w-full' : 'rounded-xl py-3 border-gray-100 bg-gray-50/50 w-full'"
              [showIcon]="true" class="w-full">
            </p-datepicker>
            <p *ngIf="isInvalid('date')" class="text-red-500 text-[10px] font-bold px-1 transition-all">Required field</p>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div class="flex flex-col gap-2">
              <label class="text-[10px] uppercase font-black text-gray-400 tracking-widest px-1">Requested In <span *ngIf="postType !== 'view'" class="text-red-500">*</span></label>
              <p-datepicker formControlName="requestedIn" [timeOnly]="true" hourFormat="12" appendTo="body" styleClass="w-full"
                placeholder="Select time"
                [inputStyleClass]="isInvalid('requestedIn') ? 'border-red-500 rounded-xl py-3 w-full' : 'rounded-xl py-3 border-gray-100 bg-gray-50/50 w-full'"
                [showIcon]="true" icon="pi pi-clock" class="w-full">
              </p-datepicker>
              <p *ngIf="isInvalid('requestedIn')" class="text-red-500 text-[10px] font-bold px-1 transition-all">Required field</p>
            </div>

            <div class="flex flex-col gap-2">
              <label class="text-[10px] uppercase font-black text-gray-400 tracking-widest px-1">Requested Out <span *ngIf="postType !== 'view'" class="text-red-500">*</span></label>
              <p-datepicker formControlName="requestedOut" [timeOnly]="true" hourFormat="12" appendTo="body" styleClass="w-full"
                placeholder="Select time"
                [inputStyleClass]="isInvalid('requestedOut') ? 'border-red-500 rounded-xl py-3 w-full' : 'rounded-xl py-3 border-gray-100 bg-gray-50/50 w-full'"
                [showIcon]="true" icon="pi pi-clock" class="w-full">
              </p-datepicker>
              <p *ngIf="isInvalid('requestedOut')" class="text-red-500 text-[10px] font-bold px-1 transition-all">Required field</p>
            </div>
          </div>
        </div>

        <div class="bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col gap-2">
          <div class="flex justify-between items-center px-1">
            <label class="text-[10px] uppercase font-black text-gray-400 tracking-widest">Reason <span *ngIf="postType !== 'view'" class="text-red-500">*</span></label>
            <span class="text-[9px] font-bold"
              [ngClass]="(regForm.get('reason')?.value?.length || 0) < 10 ? 'text-orange-400' : 'text-green-400'">
              {{regForm.get('reason')?.value?.length || 0}} / 200
            </span>
          </div>
          <textarea pTextarea rows="4" formControlName="reason"
            class="w-full rounded-2xl border-gray-100 bg-gray-50/50 p-4 text-xs font-medium focus:ring-2 focus:ring-blue-100 transition-all resize-none"
            placeholder="Please describe the reason for regularization..."></textarea>
          <div *ngIf="regForm.get('reason')?.touched && postType !== 'view'">
            <small class="text-red-500 text-[10px] font-bold px-1"
              *ngIf="regForm.get('reason')?.errors?.['required']">Reason is required</small>
            <small class="text-orange-500 text-[10px] font-bold px-1"
              *ngIf="regForm.get('reason')?.errors?.['minlength']">Explain at least 10 characters</small>
          </div>
        </div>
      </form>

      <div *ngIf="postType !== 'view'"
        class="absolute bottom-0 left-0 right-0 p-4 sm:p-6 bg-white/80 backdrop-blur-md border-t border-gray-100 flex justify-end gap-3 z-20">
        <p-button label="Cancel" (click)="onDrawerHide()"
          styleClass="p-button-text p-button-secondary font-bold text-xs"></p-button>
        <p-button [label]="postType === 'add' ? 'Submit Request' : 'Update Request'" icon="pi pi-check" (click)="onSubmit()" [loading]="isLoading"
          styleClass="rounded-xl px-8 py-3 bg-blue-600 border-none shadow-lg hover:bg-blue-700 transition-all text-sm font-bold">
        </p-button>
      </div>
    </div>
  </ng-template>
</p-drawer>
