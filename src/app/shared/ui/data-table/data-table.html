<div class="flex flex-col gap-3">

  <!-- Top Controls -->
  <div class="flex flex-wrap items-center justify-between gap-3">

    <!-- Rows Dropdown -->
    <div class="flex items-center gap-2">

      <span class="text-sm text-slate-600">
        Show
      </span>

      <p-select [options]="rowsOptions" [(ngModel)]="rows" [style]="{ width: '5rem' }" optionLabel="label"
        optionValue="value" (onChange)="onRowsChange($event)" />

      <span class="text-sm text-slate-600">
        rows
      </span>

    </div>

    <!-- Search -->
    <div class="flex items-center gap-2">

      <span class="text-sm text-slate-600">
        Search
      </span>

      <input pInputText type="text" placeholder="Type to search" class="w-48" [(ngModel)]="globalFilterValue"
          (input)="table.filterGlobal(globalFilterValue, 'contains')" />
        <button pButton type="button" icon="pi pi-search" (click)="table.filterGlobal(globalFilterValue, 'contains')"></button>

    </div>

  </div>

  <!-- Table -->
  <p-table #table [value]="value" [loading]="loading" [paginator]="true" [rows]="rows"
    [rowsPerPageOptions]="rowsPerPageOptions" [tableStyle]="{ 'min-width': '40rem' }"
    [globalFilterFields]="globalFilterFields" styleClass="p-datatable-sm">

    <!-- Header -->
    <ng-template pTemplate="header">

      <tr>

        <th *ngFor="let col of columns">

          {{ col.header }}

        </th>

      </tr>

    </ng-template>

    <!-- Body -->
    <ng-template pTemplate="body" let-row>

      <tr>

        <td *ngFor="let col of columns">

          {{ row[col.field] }}

        </td>

      </tr>

    </ng-template>

    <!-- Empty -->
    <ng-template pTemplate="emptymessage">

      <tr>

        <td [attr.colspan]="columns.length || 1" class="text-center text-slate-500 py-4">

          No records found.

        </td>

      </tr>

    </ng-template>

  </p-table>

</div>
